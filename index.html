<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanda Tangan Digital - Bapenda</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; }
        h2 { color: #1890ff; margin-top: 0; }
        .canvas-container { border: 2px solid #d9d9d9; background-color: #fafafa; border-radius: 8px; margin: 20px 0; touch-action: none; position: relative; }
        canvas { width: 100%; height: 200px; cursor: crosshair; }
        .btn-group { display: flex; gap: 12px; justify-content: center; }
        button { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-clear { background-color: #ff4d4f; color: white; }
        .btn-clear:hover { background-color: #d9363e; }
        .btn-submit { background-color: #1890ff; color: white; flex-grow: 1; }
        .btn-submit:hover { background-color: #096dd9; }
        .btn-submit:disabled { background-color: #bfbfbf; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Tanda Tangan</h2>
        <p>Silakan tanda tangan di bawah ini untuk kehadiran.</p>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="btn-group">
            <button class="btn-clear" onclick="hapusTTD()">Ulangi</button>
            <button class="btn-submit" id="btnSubmit" onclick="prosesTTD()">Lanjut ke Form</button>
        </div>
        
        <div id="status"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        const btnSubmit = document.getElementById('btnSubmit');
        
        const signaturePad = new SignaturePad(canvas, {
            penColor: "black",
            backgroundColor: "rgba(255, 255, 255, 0)"
        });

        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
        window.onresize = resizeCanvas;
        resizeCanvas();

        function hapusTTD() {
            signaturePad.clear();
            statusDiv.innerText = "";
        }

        async function prosesTTD() {
            if (signaturePad.isEmpty()) {
                alert("Silakan tanda tangan terlebih dahulu!");
                return;
            }

            btnSubmit.innerText = "Mengupload...";
            btnSubmit.disabled = true;
            statusDiv.innerText = "Sedang menyimpan tanda tangan ke Drive...";

            try {
                const dataURI = signaturePad.toDataURL("image/png");
                const base64Data = dataURI.split(',')[1];
                
                // URL Deployment terbaru
                const scriptURL = 'https://script.google.com/macros/s/AKfycbwhIMbVkF-0DOv0nBZtaPRLjdC3jaEShwl5LBW7HelctwU1guagB8f7LvrgOiuqpd8y/exec';

                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ image: base64Data })
                });

                const result = await response.json();

                if (result.success) {
                    statusDiv.innerText = "Berhasil! Mengalihkan ke Google Form...";
                    
                    // --- KONFIGURASI PRE-FILLED ---
                    const baseUrl = "https://docs.google.com/forms/d/e/1FAIpQLSczR-zF0K9C_f_eVO1QHZFo4pJtHtgCgL3Dqk1Sm_4xWqc_Lg/viewform";
                    const entryID = "entry.2010947988"; // ID kolom TTD
                    
                    // Menggabungkan link TTD dari Drive ke URL Google Form
                    const finalUrl = `${baseUrl}?usp=pp_url&${entryID}=${encodeURIComponent(result.url)}`;
                    
                    // Pindah ke halaman Google Form
                    window.location.href = finalUrl;
                } else {
                    throw new Error(result.error);
                }
            } catch (e) {
                console.error(e);
                alert("Terjadi kesalahan: " + e.message);
                btnSubmit.innerText = "Coba Lagi";
                btnSubmit.disabled = false;
            }
        }
    </script>
</body>
</html>
