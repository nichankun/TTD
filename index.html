<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tanda Tangan Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .canvas-container { border: 2px dashed #3498db; margin-bottom: 15px; background-color: #fafafa; border-radius: 8px; }
        canvas { width: 100%; height: 250px; cursor: crosshair; display: block; }
        .buttons { display: flex; gap: 10px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #clear { background-color: #e74c3c; color: white; }
        #submit { background-color: #2ecc71; color: white; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        h3 { margin: 0 0 10px 0; color: #2c3e50; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h3>Input Tanda Tangan</h3>
    <form id="signatureForm">
        <label>Nama Lengkap:</label>
        <input type="text" id="nama" placeholder="Masukkan nama Anda..." required>

        <label>Goreskan Tanda Tangan:</label>
        <div class="canvas-container">
            <canvas id="signature-pad"></canvas>
        </div>
        
        <div class="buttons">
            <button type="button" id="clear">Hapus</button>
            <button type="submit" id="submit">Kirim Sekarang</button>
        </div>
    </form>
</div>

<script>
    const canvas = document.getElementById("signature-pad");
    const signaturePad = new SignaturePad(canvas, {
        backgroundColor: 'rgb(255, 255, 255)',
        penColor: 'rgb(0, 0, 0)'
    });

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear(); 
    }

    window.onresize = resizeCanvas;
    resizeCanvas();

    const form = document.getElementById("signatureForm");
    const submitBtn = document.getElementById("submit");

    form.onsubmit = async (e) => {
        e.preventDefault();
        
        if (signaturePad.isEmpty()) {
            return alert("Silakan tanda tangan terlebih dahulu!");
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "Sedang Mengirim...";

        const ttdData = signaturePad.toDataURL(); 
        const namaUser = document.getElementById("nama").value;
        
        // GANTI DENGAN URL WEB APP (AKHIRAN /exec) DARI APPS SCRIPT ANDA
        const webAppUrl = "https://script.google.com/macros/s/AKfycbyUD6ylqQjLg6bqxtSWdX6JVAKu5ql6FhrwcCioi1Y8MF4oWV7Jf9KEEaC10q2yk1WG/exec"; 

        const formData = new URLSearchParams();
        formData.append("nama", namaUser); 
        formData.append("ttd", ttdData);

        try {
            await fetch(webAppUrl, {
                method: "POST",
                body: formData,
                mode: "no-cors" 
            });

            alert("Berhasil! Data tersimpan. Mengalihkan ke Google Form...");

            // OTOMATIS BERALIH HALAMAN SETELAH KIRIM
            window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSczR-zF0K9C_f_eVO1QHZFo4pJtHtgCgL3Dqk1Sm_4xWqc_Lg/viewform?usp=pp_url&entry.2010947988=TERKIRIM";

        } catch (err) {
            alert("Gagal kirim data.");
            console.error(err);
            submitBtn.disabled = false;
            submitBtn.innerText = "Kirim Sekarang";
        }
    };

    document.getElementById("clear").addEventListener("click", () => {
        signaturePad.clear();
    });
</script>

</body>
</html>
