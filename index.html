<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanda Tangan Formulir</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            background-color: #f4f4f9; 
        }
        .canvas-container { 
            border: 2px dashed #ccc; 
            background-color: #fff; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            touch-action: none; 
        }
        canvas { 
            width: 100%; 
            max-width: 400px; 
            height: 200px; 
        }
        .btn-group { 
            display: flex; 
            gap: 10px; 
        }
        button { 
            padding: 10px 20px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
        }
        .btn-clear { background-color: #ff4d4f; color: white; }
        .btn-submit { background-color: #1890ff; color: white; }
        .btn-submit:disabled { background-color: #91caff; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>Tanda Tangan Di Sini</h2>
    <p style="text-align: center; font-size: 14px; color: #666;">
        Silakan buat tanda tangan Anda di dalam kotak, lalu klik "Lanjut ke Form".
    </p>

    <div class="canvas-container">
        <canvas id="canvas" width="400" height="200"></canvas>
    </div>

    <div class="btn-group">
        <button class="btn-clear" onclick="hapusTTD()">Ulangi</button>
        <button class="btn-submit" id="btnSubmit" onclick="prosesTTD()">Lanjut ke Form</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const signaturePad = new SignaturePad(canvas, {
            penColor: "black"
        });

        function hapusTTD() {
            signaturePad.clear();
        }

        async function prosesTTD() {
            if (signaturePad.isEmpty()) {
                alert("Silakan tanda tangan terlebih dahulu!");
                return;
            }

            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerText = "Mengupload...";
            btnSubmit.disabled = true;

            try {
                const dataURI = signaturePad.toDataURL("image/png");
                const base64Data = dataURI.split(',')[1];
                
                // URL Web App kamu
                const scriptURL = 'https://script.google.com/macros/s/AKfycbxrMkHyJVBK_UN9QF_Xub7MvJ5BCcveyVh_rb6GSWcmiOWmRV8e5mlYi2NS3KexXsNW/exec';

                // Gunakan cara fetch yang lebih stabil untuk Google Script
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'cors', // Harus cors untuk ambil URL
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8', // Trik agar tidak kena pre-flight CORS
                    },
                    body: JSON.stringify({ image: base64Data })
                });

                // Cek apakah responnya OK
                const result = await response.json();

                if (result.success) {
                    btnSubmit.innerText = "Mengalihkan...";
                    
                    // URL Google Form Anda
                    const linkGoogleForm = "https://docs.google.com/forms/d/e/1FAIpQLSczR-zF0K9C_f_eVO1QHZFo4pJtHtgCgL3Dqk1Sm_4xWqc_Lg/viewform?usp=pp_url&entry.2010947988=";
                    
                    // Alihkan ke form dengan membawa link file dari Drive
                    window.location.href = linkGoogleForm + encodeURIComponent(result.url);
                } else {
                    throw new Error(result.error || "Gagal menyimpan file.");
                }

            } catch (error) {
                console.error("Error Detail:", error);
                
                // JIKA ERROR JSON TAPI FILE MASUK DRIVE (Khas Google Redirect)
                // Kita beri pesan instruksi atau coba tebak linknya jika perlu.
                alert("Upload berhasil (cek Drive), tapi browser memblokir pengalihan otomatis. Silakan refresh atau coba lagi.");
                
                btnSubmit.innerText = "Lanjut ke Form";
                btnSubmit.disabled = false;
            }
        }
    </script>
</body>
</html>
