<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 420px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h3 { text-align: center; color: #1a73e8; }
        canvas { 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            background: #fff; 
            width: 100%; 
            height: 200px; 
            touch-action: none; /* Penting untuk mobile */
            cursor: crosshair;
        }
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 14px; }
        button { 
            display: block; width: 100%; padding: 12px; margin-top: 10px; 
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        #btnSubmit { background-color: #1a73e8; color: white; }
        #btnSubmit:hover { background-color: #1557b0; }
        #btnSubmit:disabled { background-color: #ccc; }
        .btn-clear { background-color: #f1f3f4; color: #5f6368; }
        #status { margin-top: 15px; font-size: 13px; text-align: center; color: #d93025; }
    </style>
</head>
<body>

<div class="container">
    <h3>E-Signature Form</h3>
    
    <label>Tanda Tangan di Sini:</label>
    <canvas id="pad"></canvas>
    
    <button class="btn-clear" onclick="clearPad()">Hapus Coretan</button>
    <button id="btnSubmit" onclick="prosesData()">Lanjut ke Google Form</button>
    
    <p id="status"></p>
</div>

<script>
    const canvas = document.getElementById('pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // Inisialisasi Ukuran Canvas
    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Fungsi Menggambar (Mouse & Touch)
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDrawing(e) {
        drawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
    }

    function draw(e) {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        e.preventDefault();
    }

    function stopDrawing() { drawing = false; }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);

    canvas.addEventListener('touchstart', startDrawing);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDrawing);

    function clearPad() { 
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        document.getElementById('status').innerText = "";
    }

    async function prosesData() {
        const btn = document.getElementById('btnSubmit');
        const status = document.getElementById('status');
        const apiKey = '7f178a06e62b29147292c76c1d33d86f'; 
        
        // Cek apakah canvas kosong
        const blank = document.createElement('canvas');
        blank.width = canvas.width; blank.height = canvas.height;
        if (canvas.toDataURL() === blank.toDataURL()) {
            status.innerText = "Silakan tanda tangan terlebih dahulu!";
            return;
        }

        btn.disabled = true;
        status.style.color = "blue";
        status.innerText = "Sedang memproses tanda tangan...";

        try {
            // 1. Upload ke ImgBB
            const imageData = canvas.toDataURL('image/png').split(',')[1];
            const formData = new FormData();
            formData.append('image', imageData);

            const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                method: 'POST',
                body: formData
            });
            const resImg = await response.json();

            if (resImg.success) {
                const urlGambar = resImg.data.url;
                status.style.color = "green";
                status.innerText = "Berhasil! Mengalihkan...";

                // 2. Redirect ke Pre-filled Google Form
                const baseUrl = "https://docs.google.com/forms/d/e/1FAIpQLSczR-zF0K9C_f_eVO1QHZFo4pJtHtgCgL3Dqk1Sm_4xWqc_Lg/viewform";
                const prefilledUrl = `${baseUrl}?usp=pp_url&entry.2010947988=${encodeURIComponent(urlGambar)}`;

                window.location.href = prefilledUrl;
            } else {
                throw new Error("Gagal upload ke ImgBB");
            }
        } catch (err) {
            status.style.color = "red";
            status.innerText = "Terjadi kesalahan: " + err.message;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
